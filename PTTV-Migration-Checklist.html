<!-- PTTV-Migration-Checklist (260524) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTTV Chat Migration — 260524</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #faf8f5; color: #222; padding: 24px 18px; max-width: 720px; margin: 0 auto; min-height: 100vh; line-height: 1.5; }
  h1 { font-size: 22px; margin-bottom: 4px; letter-spacing: -0.3px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
  .subtitle code { background: #f0ebe2; padding: 1px 6px; border-radius: 4px; font-size: 12px; word-break: break-all; }
  .legend { font-size: 11px; color: #666; margin-bottom: 18px; padding: 10px 12px; background: #fff; border: 1px solid #e5e0d8; border-radius: 8px; line-height: 1.9; }
  .legend .pill { display: inline-block; padding: 1px 7px; border-radius: 4px; color: #fff; font-weight: 600; margin-right: 4px; font-size: 10px; letter-spacing: 0.4px; }
  .legend .green { background: #2a7; }
  .legend .red { background: #c33; }
  .legend .blue { background: #36a; }
  .legend .orange { background: #b85c00; }
  .progress-bar { height: 6px; background: #f0ebe2; border-radius: 3px; overflow: hidden; margin: 12px 0 18px; }
  .progress-fill { height: 100%; background: #2a7; transition: width 240ms ease-out; }
  .progress-text { font-size: 12px; color: #888; margin-bottom: 6px; font-variant-numeric: tabular-nums; }
  .item { background: #fff; border: 1px solid #e5e0d8; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; display: flex; gap: 12px; cursor: pointer; transition: background 120ms; border-left: 4px solid #ccc; }
  .item:hover { background: #fdfaf3; }
  .item input[type="checkbox"] { margin-top: 2px; cursor: pointer; flex-shrink: 0; width: 18px; height: 18px; accent-color: #b85c00; }
  .item .body { flex: 1; font-size: 14px; min-width: 0; }
  .item .body .title { font-weight: 600; }
  .item .body .meta { display: block; font-size: 12px; color: #666; margin-top: 6px; line-height: 1.55; }
  .item .body .meta code { background: #f0ebe2; padding: 1px 5px; border-radius: 3px; font-size: 11px; word-break: break-all; }
  .item .body .meta a { color: #36a; text-decoration: none; word-break: break-all; }
  .item .body .meta a:hover { text-decoration: underline; }
  .item .body .meta pre { background: #f6f3ed; padding: 8px 10px; margin-top: 6px; border-radius: 4px; font-size: 11px; font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; white-space: pre-wrap; word-break: break-word; border: 1px solid #e5e0d8; line-height: 1.5; }
  .item.green { border-left-color: #2a7; }
  .item.red { border-left-color: #c33; }
  .item.blue { border-left-color: #36a; }
  .item.orange { border-left-color: #b85c00; }
  .item.done .body .title, .item.done .body .meta { text-decoration: line-through; color: #bbb; }
  .item.done .body .meta a, .item.done .body .meta code { color: #bbb; }
  .actions { margin-top: 20px; padding-top: 16px; border-top: 1px solid #e5e0d8; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  button { padding: 8px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 120ms; }
  button.danger { background: #c33; color: #fff; }
  button.danger:hover { background: #e44; }
  .action-status { font-size: 12px; color: #888; margin-left: auto; }
</style>
</head>
<body>
<h1>🚛 PTTV Chat Migration — 260524</h1>
<div class="subtitle">Migrating the current PTTV iteration chat into a new one. Checks persist via <code>localStorage</code> (key: <code>pttv_migration_260524</code>). Work through these in order.</div>
<div class="legend">
  <span class="pill green">GREEN</span> bootstrap / do first &nbsp;
  <span class="pill red">RED</span> critical &nbsp;
  <span class="pill blue">BLUE</span> info-only &nbsp;
  <span class="pill orange">ORANGE</span> open / your call
</div>
<div class="progress-text" id="progress-text">0 of 0 done</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width: 0%"></div></div>
<div id="items-root"></div>
<div class="actions">
  <button class="danger" onclick="resetChecks()">⇺ Reset</button>
  <span class="action-status" id="action-status"></span>
</div>
<script>
  const STORAGE_KEY = "pttv_migration_260524";
  const ITEMS = [
    {
      id: "verify-bootstrap-commit",
      tier: "blue",
      title: "Bootstrap was just updated \u2014 verify the commit landed",
      meta: `Open <a href="https://github.com/mrgyvr/260522-pttv-live-monitor/blob/main/PTTV-Chat-Bootstrap.md" target="_blank">PTTV-Chat-Bootstrap.md</a> in the private repo. The first-line header should read <code>PTTV Chat Bootstrap (260524 c)</code>. If it does, the bootstrap is current and the next chat will pick up correctly.`,
    },
    {
      id: "save-matcher-backup",
      tier: "orange",
      title: "Optional: save a local copy of the matcher_v2 work",
      meta: `Belt-and-suspenders since matcher_v2 is unvalidated. Either <code>git clone</code> the private repo OR download the four files in <a href="https://github.com/mrgyvr/260522-pttv-live-monitor/tree/main/dryrun-fireflies-matcher-v2" target="_blank">dryrun-fireflies-matcher-v2/</a> to a local PTTV folder. Skip if you trust GitHub as the only copy.`,
    },
    {
      id: "pick-environment",
      tier: "green",
      title: "Decide which environment hosts the new chat",
      meta: `<strong>claude.ai desktop</strong> \u2014 recommended. Typically has bash, so the new chat can actually run <code>matcher_v2.py</code> and validate the 9/9. <strong>claude.ai mobile</strong> \u2014 works for design and discussion but won't execute Python. <strong>Chrome extension</strong> \u2014 only for live shows (not the case right now). Pick desktop if available.`,
    },
    {
      id: "open-new-chat",
      tier: "red",
      title: "Open a fresh chat in the PTTV project (chosen environment)",
      meta: `In claude.ai: open the PTTV project, hit "New chat". The Genesis prompt loads automatically as custom instructions, so the new Claude starts with full operating context.`,
    },
    {
      id: "paste-kickoff",
      tier: "red",
      title: "Paste the kickoff template as the first message",
      meta: `Copy from the project Files panel's <code>PTTV-New-Chats-Kickoff-Template.md</code> file, OR use this exact text:<pre>Continuing PTTV iteration work. Before doing anything else:

1. Fetch PTTV-Chat-Bootstrap.md from the repo root of mrgyvr/260522-pttv-live-monitor \u2014 use the native GitHub MCP (preferred) or Composio with account="pttv" as fallback.
2. Read it carefully, summarize the work items back in your own words, and ask me what to tackle first. Don't blast ahead \u2014 wait for direction.</pre>`,
    },
    {
      id: "verify-pickup",
      tier: "red",
      title: "Verify the new chat picked up context correctly",
      meta: `The new Claude should: (a) successfully fetch the bootstrap, (b) summarize current state in its own words including matcher_v2's unvalidated status, (c) explicitly mention the response-capture algorithm OR Phase J in progress, (d) ask what to tackle first. If any of those don't happen, retry \u2014 fetch may have silently failed.`,
    },
    {
      id: "first-task",
      tier: "orange",
      title: "Tell the new chat what to tackle first",
      meta: `Most likely option: ask it to run <code>python3 dryrun-fireflies-matcher-v2/matcher_v2.py</code> and compare output to the predicted 9/9 in <code>TRACE-PREDICTION.md</code>. If it has bash, this validates Phase J item 2 in about a minute. If no bash, ask it to do something else from the open phases list (Phase C, D, or another Phase J item like live-query design).`,
    },
    {
      id: "close-this-chat",
      tier: "blue",
      title: "Once the new chat is rolling, close this tab",
      meta: `This chat stays in your claude.ai history. Closing the tab just removes it from your active tabs. The bootstrap commit is the handoff \u2014 nothing else in this chat needs preserving.`,
    },
  ];

  function loadChecks() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch (e) { return {}; } }
  function saveChecks(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  function render() {
    const state = loadChecks();
    const root = document.getElementById("items-root");
    root.innerHTML = "";
    ITEMS.forEach((item, idx) => {
      const div = document.createElement("div");
      div.className = "item " + item.tier;
      div.dataset.id = item.id;
      if (state[item.id]) div.classList.add("done");
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = !!state[item.id];
      cb.addEventListener("change", (e) => {
        const s = loadChecks();
        s[item.id] = e.target.checked;
        saveChecks(s);
        render();
      });
      const body = document.createElement("div");
      body.className = "body";
      const title = document.createElement("div");
      title.className = "title";
      title.textContent = (idx + 1) + ". " + item.title;
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML = item.meta;
      body.appendChild(title);
      body.appendChild(meta);
      div.appendChild(cb);
      div.appendChild(body);
      div.addEventListener("click", (e) => {
        if (e.target.tagName === "INPUT" || e.target.tagName === "A") return;
        cb.checked = !cb.checked;
        cb.dispatchEvent(new Event("change"));
      });
      root.appendChild(div);
    });
    const done = ITEMS.filter(i => state[i.id]).length;
    const pct = Math.round((done / ITEMS.length) * 100);
    document.getElementById("progress-text").textContent = done + " of " + ITEMS.length + " done";
    document.getElementById("progress-fill").style.width = pct + "%";
  }

  function resetChecks() {
    if (!confirm("Reset all checks?")) return;
    localStorage.removeItem(STORAGE_KEY);
    render();
    flashStatus("Reset.");
  }

  function flashStatus(msg) {
    const el = document.getElementById("action-status");
    el.textContent = msg;
    setTimeout(() => { el.textContent = ""; }, 3000);
  }

  render();
</script>
</body>
</html>
